name: w3d3-dockerhub-publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  IMAGE_NAME: w3d3-dockerhub-app
  APP_DIR: week3/day3/labs/dockerhub-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ "${VERSION}" = "${GITHUB_REF_NAME}" ]; then
            VERSION="0.1.0-${GITHUB_SHA::7}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Run unit test
        run: |
          week3/day3/labs/quality-gates/unit-test.sh

      - name: Run SAST and secret scan
        run: |
          week3/day3/labs/quality-gates/sast-scan.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image for DAST
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}

      - name: Run DAST health check
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
        run: |
          week3/day3/labs/quality-gates/dast-health-check.sh

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_DIR }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}

      - name: Show pull command
        run: |
          echo "docker pull <dockerhub-username>/${IMAGE_NAME}:${{ steps.meta.outputs.version }}"
          echo "docker run -p 18088:8080 <dockerhub-username>/${IMAGE_NAME}:${{ steps.meta.outputs.version }}"
